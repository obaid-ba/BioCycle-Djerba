services:
  db:
    image: postgres:16-alpine
    container_name: biocycle-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biocycle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biocycle}
      POSTGRES_DB: ${POSTGRES_DB:-biocycle}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biocycle} -d ${POSTGRES_DB:-biocycle}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: biocycle-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biocycle-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      MQTT_HOST: mqtt
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  uploads_data:
